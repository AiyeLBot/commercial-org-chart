<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commercial Team Org Chart — MallPlus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    header { margin-bottom: 36px; text-align: center; }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a2e4a;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    header p { font-size: 0.8rem; color: #7a8ea0; margin-top: 4px; }
    .legend {
      display: flex;
      gap: 28px;
      margin-top: 32px;
      font-size: 0.75rem;
      color: #5a7089;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-solid { width: 36px; height: 2px; background: #b0c4de; }
    .legend-dotted { width: 36px; height: 0; border-top: 2px dashed #b0c4de; }
    .legend-dashed-red { width: 36px; height: 0; border-top: 2px dashed #dc2626; }
    .legend-red-text { color: #dc2626; font-weight: 600; }
    footer { margin-top: 28px; font-size: 0.72rem; color: #a0b0c0; text-align: center; }
  </style>
</head>
<body>

<header>
